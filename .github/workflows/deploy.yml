name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Build all bloques
        run: |
          npm run build:01
          npm run build:02
          npm run build:03
          npm run build:04
          npm run build:05
          npm run build:06
          npm run build:07
          npm run build:08

      - name: Prepare dist
        run: |
          mkdir -p dist
          # Slidev escribe relativo al directorio del archivo .md → slides/dist/
          cp -r slides/dist/. dist/
          # Index principal y .nojekyll para que GitHub Pages sirva assets con _
          cp index.html dist/index.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
